# Region flag profiles
# Flags are applied to WorldGuard regions based on their realty state.
#
# "global" applies flags to ALL realty regions regardless of state.
# "grouped" is a list of entries, each targeting a set of WG regions
# with per-state flag profiles.
#
# Available states: ALL, FOR_SALE, SOLD, FOR_RENT, RENTED
#
# Example:
# global:
#   states:
#     FOR_SALE:
#       flags:
#         greeting: "This region is for sale!"
#     SOLD:
#       flags:
#         greeting: "This region is sold."
# grouped:
#   - regions:
#       - my_region
#       - my_other_region
#     states:
#       states:
#         FOR_SALE:
#           flags:
#             pvp: deny
#             interact: allow
#         SOLD:
#           flags:
#             pvp: allow
