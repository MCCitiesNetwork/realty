help:
    main:
    - <prefix> Commands
    - <#00aaff><bold>»</bold></#00aaff> <white>Click one of the categories to learn
        more about the plugin!</white><newline>
    - <#00aaff><bold>»</bold></#00aaff> <click:run_command:/realty help basics><green><bold>Basics</bold></green>
        <grey>- General commands</grey></click>
    - <#00aaff><bold>»</bold></#00aaff> <click:run_command:/realty help offers><yellow><bold>Offers</bold></yellow>
        <grey>- Buying regions via offers</grey></click>
    - <#00aaff><bold>»</bold></#00aaff> <click:run_command:/realty help management><blue><bold>Management</bold></blue>
        <grey>- Manage your regions</grey></click>
    - <#00aaff><bold>»</bold></#00aaff> <click:run_command:/realty help auctions><gold><bold>Auctions</bold></gold>
        <grey>- Bidding on region auctions</grey></click>
    unknown-category: '<red>Unknown category. Use: basics, offers, or auctions.</red>'
    basics:
    - <prefix> Basic Commands
    - <dark_grey>►</dark_grey> <green>/realty help</green> <grey>- Show help categories</grey>
    - <dark_grey>►</dark_grey> <green>/realty info <region></green> <grey>- Display
        region info</grey>
    - <dark_grey>►</dark_grey> <green>/realty list [--player <player>] [--page <page>]</green>
        <grey>- List regions</grey>
    - <dark_grey>►</dark_grey> <green>/realty buy <region></green> <grey>- Buy a region
        at the listed price</grey>
    - <dark_grey>►</dark_grey> <green>/realty rent <region></green> <grey>- Rent a
        region</grey>
    - <dark_grey>►</dark_grey> <green>/realty extend <region></green> <grey>- extend
        a leasehold</grey>
    - <dark_grey>►</dark_grey> <green>/realty unrent <region></green> <grey>- End your
        lease early for a prorated refund</grey>
    - <dark_grey>►</dark_grey> <green>/realty terminate <region></green> <grey>- Schedule
        a lease to end after notice</grey>
    - <dark_grey>►</dark_grey> <green>/realty terminate cancel <region></green> <grey>-
        Cancel a scheduled termination</grey>
    - <dark_grey>►</dark_grey> <green>/realty add <player> <region></green> <grey>-
        Add a player to a region</grey>
    - <dark_grey>►</dark_grey> <green>/realty remove <player> <region></green> <grey>-
        Remove a player from a region</grey>
    offers:
    - <prefix> Offer Commands
    - <dark_grey>►</dark_grey> <yellow>/realty offer send <price> <region></yellow>
        <grey>- Make an offer on a region</grey>
    - <dark_grey>►</dark_grey> <yellow>/realty offer inbox</yellow> <grey>- View offers
        received on your regions</grey>
    - <dark_grey>►</dark_grey> <yellow>/realty offer outbox</yellow> <grey>- View
        offers you have sent</grey>
    - <dark_grey>►</dark_grey> <yellow>/realty offer accept <player> <region></yellow>
        <grey>- Accept an offer</grey>
    - <dark_grey>►</dark_grey> <yellow>/realty offer reject <player> <region></yellow>
        <grey>- Reject an offer</grey>
    - <dark_grey>►</dark_grey> <yellow>/realty offer pay <amount> <region></yellow>
        <grey>- Pay for an accepted offer</grey>
    - <dark_grey>►</dark_grey> <yellow>/realty offer withdraw <region></yellow> <grey>-
        Withdraw your offer</grey>
    auctions:
    - <prefix> Auction Commands
    - <dark_grey>►</dark_grey> <gold>/realty auction <bidduration> <paymentduration>
        <minbid> <minbidstep> <region></gold> <grey>- Create an auction</grey>
    - <dark_grey>►</dark_grey> <gold>/realty auction bid <amount> <region></gold>
        <grey>- Bid on an auction</grey>
    - <dark_grey>►</dark_grey> <gold>/realty auction paybid <amount> <region></gold>
        <grey>- Pay for a winning bid</grey>
    - <dark_grey>►</dark_grey> <gold>/realty auction cancel <region></gold> <grey>-
        Cancel an auction</grey>
    admin:
    - <prefix> Administrative Commands
    - <dark_grey>►</dark_grey> <red>/realty create freehold <name> [--price <price>]
        [--titleholder <player>] [--authority <player>]</red> <grey>- Create a freehold</grey>
    - <dark_grey>►</dark_grey> <red>/realty create leasehold <price> <period> <maxextensions>
        [--landlord <name>] <region></red> <grey>- Create a leasehold</grey>
    - <dark_grey>►</dark_grey> <red>/realty delete <region> [includeworldguard]</red>
        <grey>- Delete a region</grey>
    - <dark_grey>►</dark_grey> <red>/realty reload</red> <grey>- Reload configuration</grey>
    - <dark_grey>►</dark_grey> <red>/realty set authority <player> <region></red>
        <gray>- Set freehold authority</gray>
    management:
    - <prefix> Management Commands
    - <blue>/realty set price <price> <region></blue> <gray>- Set freehold or leasehold
        price</gray>
    - <blue>/realty unset price <region></blue> <gray>- Remove region freehold price</gray>
    - <blue>/realty set duration <duration> <region></blue> <gray>- Set lease duration</gray>
    - <blue>/realty set landlord <player> <region></blue> <gray>- Set lease landlord</gray>
    - <blue>/realty set titleholder <player> <region></blue> <gray>- Set freehold
        title holder</gray>
    - <blue>/realty unset titleholder <region></blue> <gray>- Clear freehold title
        holder</gray>
    - <blue>/realty set tenant <player> <region></blue> <gray>- Set lease tenant</gray>
    - <blue>/realty unset tenant <region></blue> <gray>- Clear lease tenant</gray>
    - <blue>/realty modify price|duration|maxextensions <value> <region></blue> <gray>-
        Propose new lease terms for the next cycle</gray>
    - <blue>/realty modify accept|reject <region></blue> <gray>- Resolve a tenant's
        proposal</gray>
    - <blue>/realty modify withdraw <region></blue> <gray>- Withdraw your pending proposal</gray>
    - <blue>/realty modify inbox|outbox</blue> <gray>- View pending proposals</gray>
    - <blue>/realty rentable <true|false> <region></blue> <gray>- Open or close a lease
        to new tenants</gray>
    - <blue>/realty agent invite <player> <region></blue> <gray>- Invite a player
        as an agent</gray>
    - <blue>/realty agent invite accept <region></blue> <gray>- Accept an agent invite</gray>
    - <blue>/realty agent invite reject <region></blue> <gray>- Reject an agent invite</gray>
    - <blue>/realty agent invite withdraw <player> <region></blue> <gray>- Withdraw
        an agent invite</gray>
    - <blue>/realty agent remove <player> <region></blue> <gray>- Remove a sanctioned
        auctioneer</gray>
