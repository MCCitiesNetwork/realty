# Enable or disable daily property tax collection.
# Requires the Treasury plugin to be installed and its DAILY cycle to be enabled.
enabled: true

# Name of the Treasury GOVERNMENT account that receives property tax proceeds.
# Must match the display name of an existing GOVERNMENT account in Treasury.
# Defaults to DCGovernment if left blank or omitted.
government-account: "DCGovernment"

# UUIDs exempt from property tax collection.
# Useful for authority, government, or server-owned accounts.
exempt-uuids: []

# Owners holding this many freehold plots or fewer pay no property tax at all.
# Set to 0 to tax everyone.
exempt-plot-threshold: 3

# ---------------------------------------------------------------------------
# Tax is assessed PER PROPERTY (per freehold region) using the first rule below
# whose tags match the region; if no rule matches, `default-formula` is used.
# Each property's tax is summed into one daily charge per owner.
#
# Formulas are arithmetic over `<plots>` (the owner's TOTAL freehold plot count):
#   operators + - * /, exponentiation ^ (e.g. <plots>^2), parentheses, decimals.
# A flat formula like "25" is a fixed per-property charge; multiply by <plots>
# for a per-property charge that scales with the owner's holdings.
#
# match:
#   all: [a, b]   -> region must carry every listed tag
#   any: [a, b]   -> region must carry at least one listed tag
# Tag ids are the `tag-id` values from region-tags.yml (case-insensitive).
# Rules are tried top-to-bottom; the first match wins.
# ---------------------------------------------------------------------------
rules:
  - match:
      all: [commercial, industrial]
    formula: "25"

  - match:
      all: [residential, waterfront]
    formula: "12 * <plots>"

  - match:
      any: [commercial]
    formula: "10"

  - match:
      all: [residential]
    formula: "2 * <plots>^2 - 4 * <plots>"

# Applied to any property matching none of the rules above.
default-formula: "2.5 * <plots>^2 - 6 * <plots>"
